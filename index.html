<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>霓虹贪吃蛇</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app" aria-label="贪吃蛇游戏">
      <section class="game-shell">
        <header class="topbar">
          <div>
            <p class="eyebrow">Snake Arcade</p>
            <h1>霓虹贪吃蛇</h1>
          </div>
          <div class="stats" aria-label="游戏数据">
            <div class="stat">
              <span>分数</span>
              <strong id="score">0</strong>
            </div>
            <div class="stat">
              <span>最佳</span>
              <strong id="best">0</strong>
            </div>
          </div>
        </header>

        <div class="board-wrap">
          <canvas id="game" width="560" height="560" aria-label="贪吃蛇棋盘"></canvas>
          <div class="overlay" id="overlay">
            <h2 id="overlayTitle">准备开始</h2>
            <p id="overlayText">按空格、回车或点击开始</p>
            <button id="startBtn" type="button">开始游戏</button>
          </div>
        </div>

        <footer class="controls">
          <div class="hint">方向键 / WASD 控制，空格暂停</div>
          <div class="pad" aria-label="触屏方向控制">
            <button class="pad-btn up" type="button" data-dir="up" aria-label="向上">↑</button>
            <button class="pad-btn left" type="button" data-dir="left" aria-label="向左">←</button>
            <button class="pad-btn down" type="button" data-dir="down" aria-label="向下">↓</button>
            <button class="pad-btn right" type="button" data-dir="right" aria-label="向右">→</button>
          </div>
        </footer>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
